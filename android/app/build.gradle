plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keyProperties = new Properties()
def keyPropertiesFile = rootProject.file('key.properties')
if (keyPropertiesFile.exists()) {
    keyPropertiesFile.withReader('UTF-8') { reader ->
        keyProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.seovulf.randmapp"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    signingConfigs {
        release {
            def cmStoreFile = System.getenv("CM_KEYSTORE_PATH")
            def cmKeyAlias = System.getenv("CM_KEY_ALIAS")

            if (cmStoreFile != null && cmKeyAlias != null) {
                storeFile file(cmStoreFile)
                keyAlias cmKeyAlias
                storePassword System.getenv("CM_KEYSTORE_PASSWORD")
                keyPassword System.getenv("CM_KEY_PASSWORD")
            }
            // for local key.properties
            else if (keyPropertiesFile.exists()) {
                storeFile file(keyProperties['storeFile'])
                keyAlias keyProperties['keyAlias']
                storePassword keyProperties['storePassword']
                keyPassword keyProperties['keyPassword']
            }
            // keyAlias keyProperties['keyAlias']
            // keyPassword keyProperties['keyPassword']
            // storeFile keyProperties['storeFile'] ? file(keyProperties['storeFile']) : null
            // storePassword keyProperties['storePassword']
        }
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.seovulf.randmapp"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
